name: Frontend CD

on:
  push:
    paths:
      - 'starter/frontend/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '16'
      - run: npm ci
      - run: CI=true npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker image
        run: |
          docker build \
            --build-arg REACT_APP_MOVIE_API_URL=http://localhost:5000 \
            -t ${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }} \
            .







  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
      - name: Push image to ECR
        run: |
          docker tag ${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }} ${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }}
          docker push ${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: push
    defaults:
      run:
        working-directory: starter/frontend/k8s
    steps:
      - uses: actions/checkout@v3
      - name: Update image tag
        run: |
          kustomize edit set image frontend=${{ secrets.FRONTEND_ECR_REPO }}:${{ github.sha }}
      - name: Deploy to cluster
        run: |
          kustomize build | kubectl apply -f -
